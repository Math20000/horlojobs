<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b3f46">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="HorloJobs">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="styles.css">
  <title>HorloJobs</title>
</head>
<body>
  <header class="app-header">
    <div class="brand"><span class="brand-mark" aria-hidden="true">⌚</span><div><h1>HorloJobs</h1><p id="last-update">Chargement du rapport…</p></div></div>
    <button id="refresh-button" class="icon-button" type="button" aria-label="Actualiser les offres">↻</button>
  </header>

  <main>
    <section id="install-tip" class="install-tip" hidden>
      <strong>Installer l’app</strong><span>Dans Safari : Partager → Sur l’écran d’accueil.</span><button type="button" class="text-button" data-close-install>Fermer</button>
    </section>

    <section class="stats" aria-label="Résumé du rapport">
      <article><strong id="total-offers">–</strong><span>offres</span></article>
      <article class="new-stat"><strong id="new-offers">–</strong><span>nouvelles</span></article>
      <article><strong id="favorite-count">0</strong><span>favoris</span></article>
    </section>

    <section class="search-panel" aria-label="Rechercher une offre">
      <label class="search-box"><span aria-hidden="true">⌕</span><input id="search" type="search" placeholder="Poste, entreprise ou ville"></label>
      <div class="select-row">
        <select id="source-filter" aria-label="Filtrer par source"><option value="">Toutes les sources</option></select>
        <select id="sort" aria-label="Trier les offres"><option value="score">Meilleurs scores</option><option value="new">Nouvelles d’abord</option><option value="company">Entreprise</option></select>
      </div>
      <div class="filters" role="group" aria-label="Filtre d’offres">
        <button type="button" class="filter active" data-filter="all">Toutes</button>
        <button type="button" class="filter" data-filter="new">Nouvelles</button>
        <button type="button" class="filter" data-filter="favorites">Favoris</button>
      </div>
    </section>

    <p id="result-count" class="result-count" aria-live="polite"></p>
    <section id="job-list" class="job-list" aria-label="Offres d’emploi"></section>
    <section id="empty-state" class="empty-state" hidden><span>⌕</span><h2>Aucune offre trouvée</h2><p>Modifie les filtres ou relance la recherche.</p></section>

    <details class="source-status"><summary>État des sources</summary><ul id="source-list"></ul></details>
  </main>

  <dialog id="job-dialog" class="job-dialog">
    <article>
      <button id="close-dialog" class="close-button" type="button" aria-label="Fermer">×</button>
      <div id="job-detail"></div>
    </article>
  </dialog>

  <template id="job-card-template">
    <article class="job-card">
      <div class="job-card-top"><span class="score"></span><button class="favorite" type="button" aria-label="Ajouter aux favoris">♡</button></div>
      <div class="badges"><span class="new-badge" hidden>NOUVELLE</span><span class="source-badge"></span></div>
      <h2 class="title"></h2><p class="company"></p><p class="location"></p><p class="reason"></p>
      <div class="card-actions"><button class="details" type="button">Voir l’offre</button><a class="open" target="_blank" rel="noopener">Ouvrir</a></div>
    </article>
  </template>
  <script src="app.js"></script>
</body>
</html>
